theme = "catppuccin_transparent"

[editor]
line-number = "relative"
mouse = true
shell = ["fish", "-iC"]
completion-trigger-len = 1
completion-timeout = 100
preview-completion-insert = true
true-color = true
color-modes = false
popup-border = "all"
bufferline = "multiple"
auto-pairs = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = true

[editor.statusline]
left = ["mode", "version-control","spacer", "spinner"]
center = ["read-only-indicator", "file-name", "separator", "total-line-numbers"]
separator = "󰨦"
mode.normal = " 󱓞 ノーマル"
mode.insert = "  インサート"
mode.select = " 󰆏 セレクション"

[editor.lsp]
display-messages = true
display-inlay-hints = true

[editor.gutters.line-numbers]
min-width = 0

[keys.normal]
C-s = ":w"
C-x = ":x"
C-r = ":config-reload"

[keys.normal.space]
o = ":config-open"
x = ":buffer-close!"
