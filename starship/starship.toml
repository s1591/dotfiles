# Inserts a blank line between shell prompts
add_newline = true
command_timeout = 1000

[character]
success_symbol = "[≤░φΟ ](purple)"
error_symbol = "[ΎΖξ](bold red)"
#ΏθγΑ #έεΩ
#╬╗  #ΎΛΘ
#έγκΎ╕Π #ΌΙ┤
#ΏθΤΑ #ΎΣζ
#ΎΓσ  #ΎΣτ
#ΎΗΩ  #Όζ╖
#ΎΖξ  #ΎΜΨ

#Make prompt a single line 
[line_break]
disabled = true

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[shell]
fish_indicator = "{≤░Ι║ }"
powershell_indicator = "{ΎΣι_}"
zsh_indicator = "{zsh}"
bash_indicator = "{bsh}"
nu_indicator = "{nu}"
xonsh_indicator = "{xsh}"
unknown_indicator = "{mystery shell}"
style = "cyan bold"
disabled = false


# [localip]
# ssh_only = false
# format = "@[$localipv4](bold red) "
# disabled = false


[username]
# format = "$user@"
# format = "ΏθγΑ@" #"ΎΜΨ"
format = "ΎΜΨ @"
show_always=true
style_root = "bold red"

[hostname]
disabled = false
format = "$hostname in " # "$hostname ΏθγΑ in "
ssh_only = false
# style = "bold dimmed red"
trim_at = "-"

[directory]
format = "[$path]($style)[$read_only]($read_only_style) "
# style = "bold #f57800"
style = "purple"
read_only = " ΏθΦΤ"
read_only_style = "red"

[git_status]
ahead = "έΘκ${count}"
behind = "έΘμ${count}"
deleted = "x"
diverged = "έΘΧέΘκ${ahead_count}έΘμ${behind_count}"
style = "white"

[cmd_duration]
disabled = false
format = "took [$duration]($style) "
min_time = 1

[battery]
full_symbol = "≤░Β╣ "
charging_symbol = "≤░ΓΕ "
discharging_symbol ="≤░ΓΔ "
unknown_symbol = "≤░ΓΣ "
empty_symbol = "≤░ΓΟ "
disabled = false
[[battery.display]]
threshold = 100
style = "bold red"

